<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="マイゲーム">
    <link rel="manifest" href="manifest.json">
    <title>ぽこポケ振り分け</title>
    <link rel="stylesheet" href="poko-style.css">
</head>
<body>
    <div id="fallback-screen" style="display:none; position:fixed; inset:0; z-index:9999; background:#fff9e6; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-family:sans-serif;">
        <img src="icon.png" style="width:120px; border-radius:20%; margin-bottom:20px; box-shadow:0 10px 20px rgba(0,0,0,0.1);">
        <h2 style="color:#ff6b6b;">ぽこあポケモン組分けツール</h2>
        <p style="color:#888; margin-bottom:30px;">下のボタンを押して開始</p>
        <button onclick="document.getElementById('fallback-screen').style.display='none'; initLevel(0);" 
            style="background:#6bcb77; color:#fff; border:none; border-radius:50px; padding:15px 40px; font-size:1.2rem; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #2d7a35;">
            組分け開始
        </button>
    </div>

    <div class="sticky-header">
        <div class="header">
            <h1>🌿 ぽこポケ振り分け</h1>
            <div class="stats" id="headerStats"></div>
        </div>
        <div class="progress-bar" id="progressBar"></div>
        <div class="controls">
            <input type="text" id="searchBox" class="search-box" placeholder="名前やNo.で検索...">
            <button class="btn-ui" id="filterBtn" onclick="toggleFilterPanel()">🔍 絞込</button>
            <button class="btn-ui" id="selBtn" onclick="toggleSelectMode()">複数選択</button>
        </div>
        <div class="filter-panel" id="filterPanel">
            <div class="filter-section">
                <div class="filter-section-label">✨ 得意なこと（OR）</div>
                <div class="filter-chips" id="jobChips"></div>
            </div>
            <div class="filter-divider"></div>
            <div class="filter-section">
                <div class="filter-section-label">🌈 雰囲気（OR）</div>
                <div class="filter-chips" id="envChips"></div>
            </div>
            <span class="filter-clear" onclick="clearFilters()">フィルターをリセット</span>
        </div>
        <div class="tabs" id="tabs"></div>
    </div>

    <div id="mainContent"></div>

    <div class="multi-bar" id="multiBar">
        <div class="multi-bar-header">
            <div class="multi-count">🚀 <span id="selCount">0</span> 匹を一括移動</div>
            <button class="btn-ui" onclick="toggleSelectMode()">キャンセル</button>
        </div>
        <div class="area-grid-mini" id="miniAreaList"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button> 
            <div class="modal-poke-header" id="modalHeader"></div>

            <div class="section-label">お仕事</div>
            <div class="job-grid" id="valJob"></div>

            <div class="info-row">
                <div class="info-chip"><span>雰囲気</span><span id="valEnv"></span></div>
                <div class="info-chip"><span>好きな味</span><span id="valTaste"></span></div>
            </div>
            <div class="tag-row" id="valTags"></div>

            <div class="section-label">エリアに割り当てる</div>
            <div class="area-btn-group" id="areaButtons"></div>
            <button class="remove-btn" onclick="removeAssignment()">エリアから外す</button>
        </div>
    </div>
    
    <script src="poko-app.js"></script>
</body>
</html>
