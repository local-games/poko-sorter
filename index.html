    <title>ぽこポケ振り分け</title>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
  :root {
    --bg: #0f1923; --surface: #1a2635; --surface2: #243447;
    --accent: #f6c90e; --accent2: #e05c5c; --pink: #ff7eb9; --green: #4ade80; --blue: #60a5fa;
    --text: #e8f0f7; --text-muted: #7a94aa; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: 140px; }

  /* ===== 固定ヘッダー ===== */
  .sticky-header { position: sticky; top: 0; z-index: 100; background: var(--bg); }
  .header { background: var(--surface); padding: 12px 16px; display: flex; align-items: center; border-bottom: 2px solid var(--surface2); }
  .header h1 { font-size: 17px; font-weight: 800; color: var(--accent); flex: 1; }
  .header .stats { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.4; }
  .progress-bar { height: 5px; background: var(--surface2); display: flex; }
  .progress-seg { height: 100%; transition: width 0.4s; }

  /* ===== 検索・ボタン ===== */
  .controls { padding: 8px 12px; background: var(--surface); display: flex; gap: 6px; border-bottom: 1px solid var(--surface2); }
  .controls-row1 { display: flex; gap: 8px; }
  .controls-row2 { display: flex; gap: 6px; padding-bottom: 8px; }
  .search-box { flex: 1; background: var(--bg); border: 1.5px solid var(--surface2); color: var(--text); padding: 8px 12px; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; min-width: 0; }
  .btn-ui { background: var(--surface2); border: 1.5px solid var(--surface2); color: var(--text-muted); padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-ui.active { border-color: var(--accent); color: var(--accent); background: #f6c90e15; }

  /* ===== フィルターパネル ===== */
  .filter-panel { background: var(--bg); border-bottom: 1px solid var(--surface2); overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
  .filter-panel.open { max-height: 400px; }
  .filter-section { padding: 10px 12px 4px; }
  .filter-section-label { font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.06em; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 5px; padding-bottom: 8px; }
  .filter-chip { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 20px; background: var(--surface); border: 1.5px solid var(--surface2); color: var(--text-muted); font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: #f6c90e15; }
  .filter-chip.env-chip.active { border-color: var(--blue); color: var(--blue); background: #60a5fa15; }
  .filter-divider { height: 1px; background: var(--surface2); margin: 0 12px; }
  .filter-clear { display: block; text-align: center; padding: 8px; font-size: 11px; color: var(--accent2); font-weight: 700; cursor: pointer; }

  /* ===== タブ ===== */
  .tabs { display: flex; overflow-x: auto; padding: 8px 12px; gap: 6px; background: var(--bg); scrollbar-width: none; border-bottom: 1px solid var(--surface2); }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { white-space: nowrap; padding: 7px 14px; border-radius: 20px; background: var(--surface); border: 1.5px solid transparent; color: var(--text-muted); font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; flex-shrink: 0; }
  .tab.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .tab.unassigned-tab.active { background: #e05c5c22; border-color: var(--accent2); color: var(--accent2); }
  .tab-count { font-size: 10px; opacity: 0.75; margin-left: 3px; }

  /* ===== グリッド ===== */
  .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; padding: 12px; }
  .poke-card { background: var(--surface); border-radius: 12px; padding: 10px 6px 8px; text-align: center; position: relative; border: 2px solid transparent; transition: all 0.15s; cursor: pointer; }
  .poke-card:active { transform: scale(0.93); }
  .poke-card.assigned { opacity: 0.65; }
  .poke-card.selected { border-color: var(--accent); background: #f6c90e12; transform: scale(0.94); box-shadow: 0 0 0 2px #f6c90e44; }
  .poke-card img { width: 56px; height: 56px; image-rendering: pixelated; display: block; margin: 0 auto 4px; }
  .poke-name { font-size: 10px; font-weight: 700; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 選択バッジ  */
  .select-badge { position: absolute; top: -5px; left: -5px; background: var(--accent); color: #000; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 900; line-height: 22px; text-align: center; display: none; box-shadow: 0 2px 6px rgba(0,0,0,0.4); z-index: 2; }
  .poke-card.selected .select-badge { display: block; }

  /* エリア色ドット */
  .area-dot { position: absolute; top: 6px; right: 6px; width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); }

  /* ===== 一括操作バー (pokopokeのデザイン) ===== */
  .multi-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a2635f0; backdrop-filter: blur(10px); padding: 14px 12px 28px; border-top: 2px solid var(--accent); border-radius: 20px 20px 0 0; z-index: 150; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
  .multi-bar.open { transform: translateY(0); }
  .multi-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .multi-count { font-weight: 800; color: var(--accent); font-size: 14px; }
  .area-grid-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .area-mini-btn { border: none; border-radius: 10px; padding: 12px 4px 10px; font-size: 11px; font-weight: 800; font-family: inherit; color: #000; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .area-mini-btn:active { opacity: 0.75; }
  .area-mini-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,0.25); }
  .remove-mini-btn { background: #3a3a4a !important; color: var(--accent2) !important; border: 1.5px solid var(--accent2) !important; }

  /* ===== モーダル  ===== */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; padding: 20px 16px 36px; transform: translateY(100%); transition: 0.3s; max-height: 90vh; overflow-y: auto; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-close { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1; }

  .modal-poke-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .modal-poke-name { font-size: 20px; font-weight: 800; color: var(--accent); }
  .modal-poke-no { color: var(--text-muted); font-size: 12px; margin-top: 2px; }

  .section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.05em; }

  .job-grid { display: grid; gap: 6px; }
  .job-card { background: var(--surface2); padding: 9px 10px; border-radius: 10px; border-left: 3px solid var(--accent); }
  .job-title { font-weight: 800; color: var(--accent); font-size: 13px; }
  .job-desc { font-size: 11px; margin-top: 3px; color: var(--text-muted); line-height: 1.4; }

  .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .info-chip { background: var(--surface2); padding: 8px 10px; border-radius: 10px; font-size: 12px; }
  .info-chip span { color: var(--text-muted); font-size: 11px; display: block; margin-bottom: 2px; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { background: var(--surface2); padding: 3px 8px; border-radius: 6px; font-size: 10px; color: var(--text-muted); }

  .area-btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 6px; }
  .area-assign-btn { background: var(--surface2); border: none; color: white; padding: 11px 4px 9px; border-radius: 10px; font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .area-assign-btn:active { opacity: 0.7; }
  .remove-btn { width: 100%; margin-top: 8px; padding: 12px; background: none; border: 1.5px solid var(--accent2); color: var(--accent2); border-radius: 10px; font-size: 13px; font-weight: 800; font-family: inherit; cursor: pointer; }
    </style>
</head>

// ===== 状態管理 =====
let state = (function(){
  try {
    const saved = JSON.parse(localStorage.getItem('pokopoke-best-v1'));
    return saved || { areaNames: [...INITIAL_NAMES], assignments: {} };
  } catch(e) { return { areaNames: [...INITIAL_NAMES], assignments: {} }; }
})();

function save() { localStorage.setItem('pokopoke-best-v1', JSON.stringify(state)); }

let currentTab = 'all';
let filterUnassigned = false;
let filterJobs = new Set();
let filterEnvs = new Set();
let filterPanelOpen = false;
let selectMode = false;
let selectedArray = [];

function getSpriteUrl(n) { return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${n}.png`; }

// ===== レンダリング =====
function render() {
  renderHeader();
  renderTabs();
  renderGrid();
}

function renderHeader() {
  const total = POKEMON_LIST.length;
  const assigned = Object.keys(state.assignments).length;
  document.getElementById('headerStats').innerHTML = `${assigned}/${total} 匹<br>完了`;
  document.getElementById('progressBar').innerHTML = AREA_COLORS.map((c, i) => {
    const cnt = POKEMON_LIST.filter(p => state.assignments[p.no] === i).length;
    return `<div class="progress-seg" style="width:${cnt/total*100}%;background:${c}"></div>`;
  }).join('');
}

function renderTabs() {
  let html = `<button class="tab ${currentTab==='all'?'active':''}" onclick="switchTab('all')">すべて<span class="tab-count">${POKEMON_LIST.length}</span></button>`;
  const unassignedCnt = POKEMON_LIST.filter(p => state.assignments[p.no] == null).length;
  html += `<button class="tab unassigned-tab ${currentTab==='none'?'active':''}" onclick="switchTab('none')">未割当<span class="tab-count">${unassignedCnt}</span></button>`;
  state.areaNames.forEach((name, i) => {
    const cnt = POKEMON_LIST.filter(p => state.assignments[p.no] === i).length;
    html += `<button class="tab ${currentTab===i?'active':''}" style="${currentTab===i?`border-color:${AREA_COLORS[i]};color:${AREA_COLORS[i]}`:''}" onclick="switchTab(${i})">${name.slice(0,4)}<span class="tab-count">${cnt}</span></button>`;
  });
  document.getElementById('tabs').innerHTML = html;
}

function renderFilterPanel() {
  const allJobs = Object.keys(JOBS);
  const allEnvs = ['あかるい','あたたかい','うるおっている','くらい','すずしい','乾そうしている'];
  document.getElementById('jobChips').innerHTML = allJobs.map(j =>
    `<button class="filter-chip ${filterJobs.has(j)?'active':''}" onclick="toggleJobFilter('${j}')">${j}</button>`
  ).join('');
  document.getElementById('envChips').innerHTML = allEnvs.map(e =>
    `<button class="filter-chip env-chip ${filterEnvs.has(e)?'active':''}" onclick="toggleEnvFilter('${e}')">${e}</button>`
  ).join('');
}

function renderGrid() {
  const q = document.getElementById('searchBox').value.trim();
  let list = POKEMON_LIST;
  if (typeof currentTab === 'number') list = POKEMON_LIST.filter(p => state.assignments[p.no] === currentTab);
  if (currentTab === 'none') list = POKEMON_LIST.filter(p => state.assignments[p.no] == null);
  else if (typeof currentTab === 'number') list = POKEMON_LIST.filter(p => state.assignments[p.no] === currentTab);
  // 得意なことOR絞込
  if (filterJobs.size > 0) {
    list = list.filter(p => {
      const jobs = POKEMON_JOBS[String(p.no)] || [];
      return jobs.some(j => filterJobs.has(j));
    });
  }
  // 雰囲気OR絞込
  if (filterEnvs.size > 0) {
    list = list.filter(p => {
      const d = POKO_DATA[String(p.no)];
      return d && filterEnvs.has(d.e);
    });
  }
  // キーワード検索
  if (q) list = list.filter(p => {
    if (p.name.includes(q) || String(p.no).includes(q)) return true;
    const jobs = POKEMON_JOBS[String(p.no)] || [];
    if (jobs.some(j => j.includes(q))) return true;
    const d = POKO_DATA[String(p.no)];
    if (d) {
      if (d.e && d.e.includes(q)) return true;
      if (d.s && d.s.includes(q)) return true;
      if (d.t && d.t.some(tag => tag.includes(q))) return true;
      if (d.f && d.f.includes(q)) return true;
    }
    return false;
  });

  document.getElementById('mainContent').innerHTML = `<div class="pokemon-grid">` + list.map(p => {
    const aIdx = state.assignments[p.no];
    const sIdx = selectedArray.indexOf(String(p.no));
    const isSel = sIdx !== -1;
    return `<div class="poke-card ${aIdx!=null?'assigned':''} ${isSel?'selected':''}" onclick="handleClick('${p.no}')">
      <div class="select-badge">${sIdx + 1}</div>
      ${aIdx!=null && !isSel ? `<div class="area-dot" style="background:${AREA_COLORS[aIdx]}"></div>` : ''}
      <img src="${getSpriteUrl(p.spriteNo)}" loading="lazy">
      <div class="poke-name">${p.name}</div>
    </div>`;
  }).join('') + `</div>`;
}

// ===== フィルター操作 =====
function toggleFilterPanel() {
  filterPanelOpen = !filterPanelOpen;
  document.getElementById('filterPanel').classList.toggle('open', filterPanelOpen);
  document.getElementById('filterBtn').classList.toggle('active', filterPanelOpen);
  if (filterPanelOpen) renderFilterPanel();
}

function toggleJobFilter(job) {
  if (filterJobs.has(job)) filterJobs.delete(job); else filterJobs.add(job);
  updateFilterBtnState();
  renderFilterPanel();
  renderGrid();
}

function toggleEnvFilter(env) {
  if (filterEnvs.has(env)) filterEnvs.delete(env); else filterEnvs.add(env);
  updateFilterBtnState();
  renderFilterPanel();
  renderGrid();
}

function clearFilters() {
  filterJobs.clear();
  filterEnvs.clear();
  updateFilterBtnState();
  renderFilterPanel();
  renderGrid();
}

function updateFilterBtnState() {
  const hasFilter = filterJobs.size > 0 || filterEnvs.size > 0;
  document.getElementById('filterBtn').classList.toggle('active', hasFilter || filterPanelOpen);
}

function switchTab(id) { currentTab = id; render(); }

function toggleUnassigned() {
  filterUnassigned = !filterUnassigned;
  document.getElementById('unassignedBtn').classList.toggle('active', filterUnassigned);
  renderGrid();
}

function handleClick(no) {
  if (selectMode) {
    const idx = selectedArray.indexOf(String(no));
    if (idx === -1) selectedArray.push(String(no)); else selectedArray.splice(idx, 1);
    render();
    updateMultiBar();
  } else {
    openModal(no);
  }
}

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedArray = [];
  document.getElementById('selBtn').classList.toggle('active', selectMode);
  render();
  updateMultiBar();
}

function updateMultiBar() {
  const bar = document.getElementById('multiBar');
  if (selectMode && selectedArray.length > 0) {
    bar.classList.add('open');
    document.getElementById('selCount').innerText = selectedArray.length;
    let btns = state.areaNames.map((name, i) => {
      const textColor = isLight(AREA_COLORS[i]) ? '#1a2635' : '#fff';
      return `<button class="area-mini-btn" style="background:${AREA_COLORS[i]};color:${textColor}" onclick="bulkAssign(${i})">
        <div class="area-mini-dot"></div>${name.slice(0,4)}</button>`;
    }).join('');
    btns += `<button class="area-mini-btn remove-mini-btn" onclick="bulkRemove()">外す</button>`;
    document.getElementById('miniAreaList').innerHTML = btns;
  } else {
    bar.classList.remove('open');
  }
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128;
}

function bulkAssign(areaIdx) { selectedArray.forEach(no => { state.assignments[no] = areaIdx; }); finishBulk(); }
function bulkRemove() { selectedArray.forEach(no => { delete state.assignments[no]; }); finishBulk(); }
function finishBulk() { save(); toggleSelectMode(); }

// ===== モーダル =====
let targetPoke = null;
function openModal(no) {
  targetPoke = POKEMON_LIST.find(p => String(p.no) === String(no));
  const detail = POKO_DATA[no] || { e:"不明", t:[], s:"?" };
  const jobs = POKEMON_JOBS[no] || [];

  document.getElementById('modalHeader').innerHTML = `
    <img src="${getSpriteUrl(targetPoke.spriteNo)}" style="width:72px; image-rendering:pixelated;">
    <div>
      <div class="modal-poke-name">${targetPoke.name}</div>
      <div class="modal-poke-no">No.${no}</div>
    </div>`;

  document.getElementById('valJob').innerHTML = jobs.length
    ? jobs.map(k => {
        let desc = JOBS[k] || "詳細不明";
        if (k === "ちらかす" && TRASH_ITEMS[no]) desc = `周りに<b style="color:var(--accent)">（${TRASH_ITEMS[no]}）</b>を落とす`;
        return `<div class="job-card"><div class="job-title">✨ ${k}</div><div class="job-desc">${desc}</div></div>`;
      }).join('')
    : `<div style="color:var(--text-muted); font-size:12px; padding:4px 0;">特別な仕事はありません</div>`;

  document.getElementById('valEnv').innerText = detail.e;
  document.getElementById('valTaste').innerText = detail.s;
  document.getElementById('valTags').innerHTML = detail.t.map(t =>
    `<span class="tag">#${t}</span>`).join('');

  document.getElementById('areaButtons').innerHTML = state.areaNames.map((name, i) => {
    const textColor = isLight(AREA_COLORS[i]) ? '#1a2635' : '#fff';
    return `<button class="area-assign-btn" style="background:${AREA_COLORS[i]}22; border:1.5px solid ${AREA_COLORS[i]}44;" onclick="assignSingle(${i})">
      <div style="width:10px;height:10px;border-radius:50%;background:${AREA_COLORS[i]}"></div>
      <span style="color:${AREA_COLORS[i]}">${name.slice(0,4)}</span>
    </button>`;
  }).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function assignSingle(idx) { state.assignments[targetPoke.no] = idx; save(); closeModal(); render(); }
function removeAssignment() { delete state.assignments[targetPoke.no]; save(); closeModal(); render(); }

// ===== 検索 (poko2方式: 入力遅延なしで即反映、ただしrenderで毎回読む) =====
document.getElementById('searchBox').addEventListener('input', function() { renderGrid(); });

render();
</script>

        fallback.style.display = 'flex';

    // 次に備えてまた履歴を積む
